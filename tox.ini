# content of: tox.ini , put in same dir as setup.py
[tox]
envlist = py310, py311, py312, py313, py314

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

[testenv:dev]
deps = .[dev]
passenv = TOXENV,CI
basepython = python3
usedevelop = True
commands = pytest
